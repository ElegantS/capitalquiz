<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Cities Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1923;
    --bg2: #162030;
    --bg3: #1E2D40;
    --border: #263548;
    --text: #E8E4D9;
    --text-dim: #8A99A8;
    --amber: #F5A623;
    --amber-dim: #7A5110;
    --teal: #4ECDC4;
    --red: #E05C5C;
    --green: #5CC48A;
    --radius: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated globe grid background */
  .globe-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .globe-bg svg {
    width: 100%;
    height: 100%;
    opacity: 0.045;
  }

  #app {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 780px;
    padding: 24px;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ─── MODE SELECTION ─── */
  .mode-header {
    text-align: center;
    margin-bottom: 36px;
  }
  .mode-header .eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
  }
  .mode-header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .mode-header p {
    margin-top: 8px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .region-board {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 460px;
    margin: 0 auto;
  }
  .region-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    text-align: left;
    font-family: 'Space Grotesk', sans-serif;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .region-row:hover {
    background: var(--bg3);
    border-color: var(--amber);
    transform: translateY(-1px);
  }
  .region-row .region-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .region-row .region-best {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-left: auto;
  }
  .region-row .best-score {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .region-row .best-score.scored { color: var(--amber); }
  .region-row .best-star { color: var(--amber); font-size: 13px; }
  .region-row .chev { color: #3a4a5e; font-size: 18px; line-height: 1; }
  .region-row.world { border-color: var(--amber-dim); }
  .region-row.world .region-name { color: var(--amber); }
  .region-row.world:hover { border-color: var(--amber); }
  .board-divider { height: 1px; background: var(--border); border: none; margin: 4px 2px; }

  /* ─── GAME SCREEN ─── */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .score-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
  }
  .score-display span {
    color: var(--amber);
    font-size: 22px;
  }
  .score-num { color: var(--text) !important; }

  .quit-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .quit-btn:hover { border-color: var(--red); color: var(--red); }

  /* Progress bar */
  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 99px;
    height: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Question area — compact */
  .question-area {
    text-align: center;
    margin-bottom: 10px;
  }
  .question-meta-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .q-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text-dim);
    line-height: 1.6;
  }
  .q-badge.region { color: var(--teal); border-color: rgba(78,205,196,0.3); }
  .q-badge.hard   { color: var(--amber); border-color: var(--amber-dim); }

  /* Reclassify action chip (practice mode only) */
  .reclassify-chip {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 10px;
    border-radius: 20px;
    border: 1px dashed var(--text-dim);
    background: transparent;
    color: var(--text-dim);
    line-height: 1.6;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .reclassify-chip:hover {
    border-style: solid;
    border-color: var(--green);
    color: var(--green);
    background: rgba(92,196,138,0.08);
  }
  .reclassify-chip.to-hard:hover {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(245,166,35,0.08);
  }
  .reclassify-chip.confirmed {
    border-style: solid;
    border-color: var(--green);
    color: var(--green);
    background: rgba(92,196,138,0.12);
  }

  .question-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(18px, 3.5vw, 26px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .question-text .country { color: var(--amber); }

  /* ─── MAP ─── */
  .map-container {
    width: 100%;
    height: 220px;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 12px;
    position: relative;
    background: #0d1a26;
  }
  #quiz-map {
    width: 100%;
    height: 100%;
    background: #0d1a26;
  }
  .leaflet-container { background: #0d1a26 !important; }
  /* Hide Leaflet attribution to keep it clean */
  .leaflet-control-attribution { display: none !important; }
  .leaflet-control-zoom { display: none !important; }

  /* Flag overlay — top-right corner of the map */
  .map-flag {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 72px;
    height: 48px;
    border-radius: 3px;
    z-index: 600;
    background-size: cover;
    background-position: center;
    pointer-events: none;
    display: none;
  }
  .map-flag.visible { display: block; }

  /* Capital dot pulse */
  @keyframes capitalPulse {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    60%  { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
    100% { transform: translate(-50%,-50%) scale(1);   opacity: 0; }
  }
  @keyframes capitalPulseCorrect {
    0%   { transform: translate(-50%,-50%) scale(1); }
    25%  { transform: translate(-50%,-50%) scale(2.5); }
    50%  { transform: translate(-50%,-50%) scale(1.2); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }
  .capital-dot-wrap {
    position: absolute;
    width: 0; height: 0;
    pointer-events: none;
  }
  .capital-dot {
    position: absolute;
    width: 10px; height: 10px;
    background: var(--amber);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #fff;
    box-shadow: 0 0 6px rgba(245,166,35,0.8);
    z-index: 500;
  }
  .capital-dot-ring {
    position: absolute;
    width: 10px; height: 10px;
    border: 2px solid var(--amber);
    border-radius: 50%;
    transform: translate(-50%,-50%);
    animation: capitalPulse 1.8s ease-out infinite;
    z-index: 499;
  }
  .capital-dot.correct-flash {
    animation: capitalPulseCorrect 0.5s ease-out;
    background: var(--green);
    box-shadow: 0 0 10px rgba(92,196,138,0.9);
    border-color: #fff;
  }

  /* Leaflet neighbour labels */
  .neighbour-label {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 600;
    color: rgba(138,153,168,0.75);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
    pointer-events: none;
    text-shadow: 0 1px 3px #0a1520, 0 0 6px #0a1520;
  }

  /* Input area */
  .input-area {
    max-width: 420px;
    margin: 0 auto;
  }
  .answer-input {
    width: 100%;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 500;
    padding: 14px 20px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
    letter-spacing: 0.01em;
  }
  .answer-input:focus { border-color: var(--amber); background: var(--bg3); }
  .answer-input.correct {
    border-color: var(--green);
    background: #0D2018;
    color: var(--green);
    box-shadow: 0 0 0 3px rgba(92,196,138,0.25), 0 0 18px rgba(92,196,138,0.35);
    animation: correctSnap 0.18s ease-out;
  }
  .answer-input.wrong { border-color: var(--red); animation: shake 0.3s ease; }
  .answer-input::placeholder { color: var(--border); }

  @keyframes correctSnap {
    0%   { box-shadow: 0 0 0 0 rgba(92,196,138,0.5), 0 0 22px rgba(92,196,138,0.5); }
    100% { box-shadow: 0 0 0 3px rgba(92,196,138,0.25), 0 0 18px rgba(92,196,138,0.35); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Checkmark pop on correct answer */
  @keyframes checkPop {
    0%   { transform: scale(0.4); opacity: 0; }
    45%  { transform: scale(1.18); opacity: 1; }
    70%  { transform: scale(0.96); }
    100% { transform: scale(1); opacity: 1; }
  }
  .answer-hint .correct-check {
    display: inline-block;
    color: var(--green);
    font-weight: 700;
    font-size: 15px;
    line-height: 20px;
    transform-origin: center;
    animation: checkPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Score pulse when it increments on a correct answer */
  @keyframes scorePulse {
    0%   { transform: scale(1);   color: var(--text); }
    35%  { transform: scale(1.35); color: var(--green); }
    100% { transform: scale(1);   color: var(--text); }
  }
  .score-num.pulse {
    display: inline-block;
    transform-origin: center;
    animation: scorePulse 0.35s ease-out;
  }

  .answer-hint {
    margin-top: 8px;
    min-height: 20px;
    font-size: 13px;
    line-height: 20px;
    color: var(--text-dim);
    text-align: center;
    overflow: visible;
  }
  .answer-hint .revealed { color: var(--teal); font-weight: 600; }
  .answer-hint .correct-msg { color: var(--green); font-weight: 600; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    justify-content: center;
  }
  .action-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 10px 20px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .action-btn:hover { background: var(--bg3); border-color: var(--text-dim); color: var(--text); }
  .action-btn.primary {
    background: var(--amber);
    border-color: var(--amber);
    color: var(--bg);
  }
  .action-btn.primary:hover { background: #fbb740; }

  /* Keyboard hint glyph inside action buttons */
  .kbd-hint {
    display: none;
    margin-left: 7px;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 11px;
    line-height: 1;
    font-weight: 600;
    border: 1px solid currentColor;
    opacity: 0.55;
    vertical-align: baseline;
  }
  .kbd-hint.show { display: inline-block; }

  /* ─── END SCREEN ─── */
  .end-screen {
    text-align: center;
    max-width: 480px;
    margin: 0 auto;
  }
  .end-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }
  .end-score-big {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(52px, 12vw, 88px);
    font-weight: 700;
    color: var(--amber);
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 4px;
  }
  .end-score-label {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 32px;
  }
  .end-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: left;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }

  .play-again-btn {
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    color: var(--bg);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px 40px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .play-again-btn:hover { background: #fbb740; transform: translateY(-2px); }

  /* ─── CUSTOMISE LINK on mode screen ─── */
  .customise-link-wrap {
    text-align: center;
    margin-top: 20px;
  }
  .customise-link {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: var(--radius);
    transition: color 0.15s;
  }
  .customise-link:hover { color: var(--text); }

  /* ─── LEADERBOARD SCREEN ─── */
  .leaderboard-list {
    margin-top: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .leaderboard-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(38,53,72,0.5);
  }
  .leaderboard-row:nth-child(odd) { background: rgba(22,32,48,0.4); }
  .leaderboard-row:last-child { border-bottom: none; }
  .leaderboard-row.you { background: rgba(245,166,35,0.1) !important; }
  .leaderboard-rank {
    width: 22px;
    flex-shrink: 0;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-dim);
  }
  .leaderboard-row.you .leaderboard-rank { color: var(--amber); }
  .leaderboard-name {
    flex: 1;
    min-width: 0;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .leaderboard-row.you .leaderboard-name { color: var(--amber); }
  .leaderboard-score {
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text-dim);
  }
  .leaderboard-star { color: var(--amber); margin-right: 3px; }
  .leaderboard-empty {
    padding: 24px 14px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ─── END-OF-RUN RANK CALLOUT + NICKNAME PROMPT ─── */
  .rank-callout {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin: 16px 0;
    text-align: center;
  }
  .rank-callout-text { color: var(--amber); font-size: 14px; font-weight: 600; }
  .rank-callout-link {
    display: inline-block;
    margin-top: 6px;
    background: none;
    border: none;
    color: var(--teal);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .nickname-prompt-label { font-size: 13px; color: var(--text); margin-bottom: 8px; font-weight: 500; }
  .nickname-prompt-row { display: flex; gap: 8px; }
  .nickname-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--text-dim);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
  }
  .nickname-input:focus { border-color: var(--teal); }
  .nickname-save-btn {
    background: var(--amber);
    border: none;
    border-radius: var(--radius);
    color: #1a1206;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
  }

  /* ─── CUSTOMISE SCREEN ─── */
  .customise-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 12px;
  }
  .customise-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .customise-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 3px;
  }
  .customise-header-right {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .reset-btn:hover { border-color: var(--red); color: var(--red); }
  .back-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .back-btn:hover { background: var(--bg3); border-color: var(--text-dim); }

  .customise-body {
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    padding-right: 4px;
  }
  .customise-body::-webkit-scrollbar { width: 4px; }
  .customise-body::-webkit-scrollbar-track { background: transparent; }
  .customise-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .region-group { margin-bottom: 8px; }
  .region-group-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    padding: 11px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);

// ─── CUSTOM DIFFICULTY OVERRIDES (localStorage) ───────────────────────────────
const STORAGE_KEY = 'capitalQuizCustomDiff';

function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}
function saveOverrides(overrides) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}
function getEffectiveDifficulty(q) {
  const overrides = loadOverrides();
  return overrides[q.country] || q.difficulty;
}
// UI label for a difficulty value. The stored values stay 'easy'/'hard';
// only what the user sees changes: easy = mastered, hard = still to learn.
function masteryLabel(diff) { return diff === 'easy' ? 'Mastered' : 'Learning'; }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function normalizeAnswer(s) {
  return s.trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")  // strip diacritics
    .replace(/[^a-z0-9\s]/g, "")
    .replace(/\s+/g, " ");
}

function checkAnswer(input, q) {
  const norm = normalizeAnswer(input);
  const accepted = q.accept || [q.capital];
  return accepted.some(a => normalizeAnswer(a) === norm);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── PERSONAL BESTS (localStorage) ───────────────────────────────────────────
const BESTS_KEY = 'capitalQuizBests';
function loadBests() {
  try { return JSON.parse(localStorage.getItem(BESTS_KEY) || '{}'); }
  catch { return {}; }
}
function saveBests(b) { localStorage.setItem(BESTS_KEY, JSON.stringify(b)); }
function fmtTime(ms) {
  const s = Math.round(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
// Update the stored best for a region if this run beats it.
// Ranking: more correct wins; on a tie, faster time wins.
function recordBest(regionKey, correct, total, timeMs) {
  const bests = loadBests();
  const prev = bests[regionKey];
  const better = !prev || correct > prev.correct ||
    (correct === prev.correct && timeMs < prev.timeMs);
  if (better) {
    bests[regionKey] = { correct, total, timeMs, star: correct === total };
    saveBests(bests);
  }
  return better;
}

// Additive online layer: the game is fully playable offline without this ever
// loading. Every call here is wrapped so a failed/blocked/offline load just
// means the leaderboard features quietly do nothing — never breaks the game.
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDEixsYmuVDBWa34HrJzuOo2labWpq4km8",
  authDomain: "capitalquiz-1e6a5.firebaseapp.com",
  projectId: "capitalquiz-1e6a5",

  messagingSenderId: "166837834531",
  appId: "1:166837834531:web:442ff719adea5af2d0f296"
};
const FIREBASE_SDK_VERSION = "10.14.1";

let fb = null; // populated once loaded: { db, doc, getDoc, setDoc, collection, query, where, getDocs }
let fbLoadPromise = null;

// Dynamically load the Firebase modular SDK, same non-blocking pattern as loadLeaflet().
function loadFirebase() {
  if (fb) return Promise.resolve(fb);
  if (fbLoadPromise) return fbLoadPromise;
  fbLoadPromise = (async () => {
    try {
      const [{ initializeApp }, firestore] = await Promise.all([
        import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-app.js`),
        import(`https://www.gstatic.com/firebasejs/${FIREBASE_SDK_VERSION}/firebase-firestore.js`)
      ]);
      const app = initializeApp(FIREBASE_CONFIG);
      const db = firestore.getFirestore(app);
      fb = {
        db,
        doc: firestore.doc,
        getDoc: firestore.getDoc,
        setDoc: firestore.setDoc,
        collection: firestore.collection,
        query: firestore.query,
        where: firestore.where,
        getDocs: firestore.getDocs,
      };
      return fb;
    } catch (e) {
      console.warn('Leaderboard unavailable (offline, blocked, or Firebase failed to load):', e);
      return null;
    }
  })();
  return fbLoadPromise;
}

// ─── Device identity & nickname (localStorage, no accounts) ─────────────────
const DEVICE_ID_KEY = 'capitalQuizDeviceId';
const NICKNAME_KEY = 'capitalQuizNickname';

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = (window.crypto && crypto.randomUUID)
      ? crypto.randomUUID()
      : 'dev-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}
function getNickname() { return localStorage.getItem(NICKNAME_KEY) || null; }
function setNickname(name) { localStorage.setItem(NICKNAME_KEY, name); }

// Submit this run to the shared leaderboard, but only if it beats the
// device's existing entry for this region (mirrors recordBest()'s own rule).
// Requires a nickname to already be set; caller is responsible for prompting first.
async function submitScoreIfBetter(region, correct, total, timeMs) {
  const firebase = await loadFirebase();
  if (!firebase) return { ok: false };
  const name = getNickname();
  if (!name) return { ok: false, needsName: true };

  const deviceId = getDeviceId();
  const docId = `${deviceId}_${region}`;
  try {
    const ref = firebase.doc(firebase.db, 'leaderboard', docId);
    const snap = await firebase.getDoc(ref);
    const prev = snap.exists() ? snap.data() : null;
    const better = !prev || correct > prev.correct ||
      (correct === prev.correct && timeMs < prev.timeMs);
    if (better) {
      await firebase.setDoc(ref, {
        deviceId, name, region, correct, total, timeMs,
        star: correct === total,
        updatedAt: Date.now(),
      });
    }
    return { ok: true, submitted: better };
  } catch (e) {
    console.warn('Leaderboard submit failed:', e);
    return { ok: false };
  }
}

// Fetch every entry for a region, ranked by accuracy then time (client-side
// sort — avoids needing a Firestore composite index at this scale).
async function fetchLeaderboard(region) {
  const firebase = await loadFirebase();
  if (!firebase) return null;
  try {
    const q = firebase.query(
      firebase.collection(firebase.db, 'leaderboard'),
      firebase.where('region', '==', region)
    );
    const snap = await firebase.getDocs(q);
    const entries = [];
    snap.forEach(d => entries.push(d.data()));
    entries.sort((a, b) => b.correct - a.correct || a.timeMs - b.timeMs);
    return entries;
  } catch (e) {
    console.warn('Leaderboard fetch failed:', e);
    return null;
  }
}

// ─── BUILD REGION BOARD (front page) ─────────────────────────────────────────
const BOARD_REGIONS = ["Europe", "Asia", "Africa", "North America", "South America", "Oceania"];

function buildBoard() {
  const board = document.getElementById('region-board');
  board.innerHTML = '';
  const bests = loadBests();

  const makeRow = (label, regionKey, isWorld) => {
    const total = QUESTIONS.filter(q => regionKey === 'All' || q.region === regionKey).length;
    const row = document.createElement('button');
    row.className = 'region-row' + (isWorld ? ' world' : '');

    const name = document.createElement('span');
    name.className = 'region-name';
    name.textContent = isWorld ? `${label} · ${total}` : label;

    const bestWrap = document.createElement('span');
    bestWrap.className = 'region-best';
    const b = bests[regionKey];
    if (b) {
      if (b.star) {
        const star = document.createElement('span');
        star.className = 'best-star';
        star.textContent = '★';
        bestWrap.appendChild(star);
      }
      const score = document.createElement('span');
      score.className = 'best-score scored';
      score.textContent = `${b.correct}/${b.total} · ${fmtTime(b.timeMs)}`;
      bestWrap.appendChild(score);
    } else {
      const score = document.createElement('span');
      score.className = 'best-score';
      score.textContent = 'Not played';
      bestWrap.appendChild(score);
    }

    const chev = document.createElement('span');
    chev.className = 'chev';
    chev.textContent = '›';
    bestWrap.appendChild(chev);

    row.appendChild(name);
    row.appendChild(bestWrap);
    row.addEventListener('click', () => startGame(regionKey));
    board.appendChild(row);
  };

  BOARD_REGIONS.forEach(r => makeRow(r, r, false));

  const divider = document.createElement('div');
  divider.className = 'board-divider';
  board.appendChild(divider);

  makeRow('World', 'All', true);
}

// ─── START GAME (completion run) ─────────────────────────────────────────────
function startGame(region) {
  const isAllRegion = region === 'All';

  // A run faces every country in the region — difficulty is no longer a filter here.
  const pool = QUESTIONS.filter(q => isAllRegion || q.region === region);
  if (!pool.length) return;

  lastSessionWasPractice = false;

  gameState = {
    questions: shuffle(pool),
    idx: 0,
    correct: 0,
    wrongByRegion: {},
    totalByRegion: {},
    showedAnswer: false,
    answered: false,
    startTime: Date.now(),
    mode: { region }
  };

  showScreen('screen-game');
  renderQuestion();
}

// ─── RENDER QUESTION ─────────────────────────────────────────────────────────
function renderQuestion() {
  const q = gameState.questions[gameState.idx];
  gameState.showedAnswer = false;
  gameState.answered = false;

  // Track totals
  gameState.totalByRegion[q.region] = (gameState.totalByRegion[q.region] || 0) + 1;

  // Score — hidden in practice mode
  const scoreEl = document.querySelector('.score-display');
  if (lastSessionWasPractice) {
    scoreEl.style.visibility = 'hidden';
  } else {
    scoreEl.style.visibility = 'visible';
    document.getElementById('score-correct').textContent = gameState.correct;
    document.getElementById('score-total').textContent = gameState.idx;
  }

  // Progress bar — hide in practice (looping makes % meaningless)
  const progressWrap = document.querySelector('.progress-bar-wrap');
  if (lastSessionWasPractice) {
    progressWrap.style.display = 'none';
  } else {
    progressWrap.style.display = 'block';
    const pct = (gameState.idx / gameState.questions.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  // Question badges
  document.getElementById('q-region').textContent = q.region;
  const effDiff = getEffectiveDifficulty(q);
  document.getElementById('q-country').textContent = q.country;

  // Reclassify chip — only in practice mode
  const chip = document.getElementById('reclassify-chip');
  if (lastSessionWasPractice) {
    const target = effDiff === 'hard' ? 'easy' : 'hard';
    chip.style.display = '';
    chip.className = 'reclassify-chip' + (target === 'hard' ? ' to-hard' : '');
    chip.textContent = `→ Mark ${masteryLabel(target)}`;
    chip.dataset.country = q.country;
    chip.dataset.target = target;
  } else {
    chip.style.display = 'none';
  }

  // Map
  const coords = CAPITAL_COORDS[q.country];
  if (coords) updateMap(q.country, coords[0], coords[1]);

  // Flag (top-right of map)
  const flagEl = document.getElementById('map-flag');
  const flagData = COUNTRY_FLAGS[q.country];
  if (flagData) {
    flagEl.style.backgroundImage = `url("${flagData}")`;
    flagEl.classList.add('visible');
  } else {
    flagEl.classList.remove('visible');
  }

  // Reset input
  const inp = document.getElementById('answer-input');
  inp.value = '';
  inp.className = 'answer-input';
  inp.disabled = false;
  inp.focus();

  document.getElementById('answer-hint').innerHTML = '';

  // Enter-key hint starts on "Show Answer" for a fresh question
  updateKbdHint('show');
}

// Move the ⏎ hint to reflect what Enter will do next ('show' or 'next')
function updateKbdHint(which) {
  const showK = document.getElementById('show-kbd');
  const nextK = document.getElementById('next-kbd');
  if (!showK || !nextK) return;
  if (lastSessionWasPractice && which === 'show') {
    // In practice there's no scored "Next" flow change, but Enter still reveals first
    showK.classList.add('show');
    nextK.classList.remove('show');
  } else if (which === 'next') {
    showK.classList.remove('show');
    nextK.classList.add('show');
  } else {
    showK.classList.add('show');
    nextK.classList.remove('show');
  }
}

// ─── HANDLE INPUT ─────────────────────────────────────────────────────────────
document.getElementById('answer-input').addEventListener('input', function() {
  if (gameState.answered) return;
  const q = gameState.questions[gameState.idx];
  if (!checkAnswer(this.value, q)) return;

  gameState.answered = true;
  this.disabled = true;

  // If the answer was revealed first, typing it still advances the flow —
  // it just doesn't score. (In practice there's no score either way.)
  if (gameState.showedAnswer) {
    setTimeout(() => advanceQuestion(), 150);
    return;
  }

  // Fresh correct answer — positive feedback.
  this.className = 'answer-input correct';
  document.getElementById('answer-hint').innerHTML = '<span class="correct-check">✓</span>';
  flashCapitalDot();

  // Score only counts in the actual game, never in practice.
  if (!lastSessionWasPractice) {
    gameState.correct++;
    const scoreNum = document.getElementById('score-correct');
    scoreNum.textContent = gameState.correct;
    scoreNum.classList.remove('pulse');
    void scoreNum.offsetWidth; // restart animation
    scoreNum.classList.add('pulse');
  }

  // Brief 150ms hold so the success registers, then advance
  setTimeout(() => advanceQuestion(), 150);
});

// ─── ENTER KEY = UNIVERSAL PROGRESSION ───────────────────────────────────────
// Correct answers auto-advance via the input handler above. So when Enter is
// pressed with a wrong/partial/empty entry: first press reveals the answer,
// second press advances to the next question.
document.getElementById('answer-input').addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  if (gameState.answered) return; // already moving on
  if (!gameState.showedAnswer) {
    revealAnswer();
  } else {
    goNext();
  }
});

// ─── SHOW ANSWER / REVEAL ────────────────────────────────────────────────────
function revealAnswer() {
  if (gameState.answered) return;
  const q = gameState.questions[gameState.idx];
  gameState.showedAnswer = true;
  const answers = q.accept ? q.accept : [q.capital];
  const label = answers.length > 1 ? 'Accepted answers' : 'Answer';
  document.getElementById('answer-hint').innerHTML =
    `<span class="revealed">${label}: ${answers.join(' · ')}</span>`;
  // Keep typing focus on the input
  document.getElementById('answer-input').focus();
  // Enter now advances → move the hint to "Next"
  updateKbdHint('next');
}

// Prevent the button from stealing focus on mousedown, then run reveal on click
const showAnswerBtn = document.getElementById('show-answer-btn');
showAnswerBtn.setAttribute('tabindex', '-1');
showAnswerBtn.addEventListener('mousedown', e => e.preventDefault());
showAnswerBtn.addEventListener('click', revealAnswer);

// ─── RECLASSIFY CHIP (practice mode) ─────────────────────────────────────────
document.getElementById('reclassify-chip').addEventListener('click', function() {
  if (!lastSessionWasPractice) return;
  const country = this.dataset.country;
  const target = this.dataset.target;
  if (!country || !target) return;

  // Find the question object's base difficulty to decide override vs default
  const qObj = QUESTIONS.find(x => x.country === country);
  if (!qObj) return;

  // Write to the same overrides the Customise screen uses
  const overrides = loadOverrides();
  if (target === qObj.difficulty) {
    delete overrides[country]; // back to default — no override needed
  } else {
    overrides[country] = target;
  }
  saveOverrides(overrides);

  // Brief confirmation
  this.classList.add('confirmed');
  this.textContent = `${country} → ${masteryLabel(target)} ✓`;

  // Eject this country from the practice loop (both pool and current queue)
  gameState.practicePool = gameState.practicePool.filter(x => x.country !== country);
  gameState.questions = gameState.questions.filter(x => x.country !== country);

  // If the pool is now empty, end the session gracefully
  if (gameState.practicePool.length === 0) {
    setTimeout(() => {
      showScreen('screen-practice');
      updatePracticeUI();
      const info = document.getElementById('practice-pool-info');
      if (info) info.innerHTML = `<span class="pool-num">All cleared!</span> You graduated every country in that set. 🎉`;
    }, 650);
    return;
  }

  // Advance to the next remaining card after a brief beat so the user sees the confirm
  setTimeout(() => {
    // If we removed the current index or shifted past the end, wrap correctly
    if (gameState.idx >= gameState.questions.length) {
      gameState.questions = shuffle(gameState.practicePool);
      gameState.idx = 0;
    }
    renderQuestion();
  }, 650);
});

// ─── GO NEXT ─────────────────────────────────────────────────────────────────
function goNext() {
  if (!gameState.answered) {
    // Not answered — count as wrong and advance
    const q = gameState.questions[gameState.idx];
    gameState.wrongByRegion[q.region] = (gameState.wrongByRegion[q.region] || 0) + 1;
    gameState.answered = true;
    const inp = document.getElementById('answer-input');
    inp.className = 'answer-input wrong';
    setTimeout(() => {
      inp.className = 'answer-input';
      advanceQuestion();
    }, 400);
  } else {
    advanceQuestion();
  }
}

const goNextBtn = document.getElementById('go-next-btn');
goNextBtn.setAttribute('tabindex', '-1');
goNextBtn.addEventListener('mousedown', e => e.preventDefault());
goNextBtn.addEventListener('click', goNext);

// ─── ADVANCE ─────────────────────────────────────────────────────────────────
function advanceQuestion() {
  gameState.idx++;
  if (gameState.idx >= gameState.questions.length) {
    if (lastSessionWasPractice) {
      // Loop: reshuffle the same fixed pool and start over
      gameState.questions = shuffle(gameState.practicePool);
      gameState.idx = 0;
      renderQuestion();
    } else {
      endGame();
    }
  } else {
    renderQuestion();
  }
}

// ─── QUIT ─────────────────────────────────────────────────────────────────────
document.getElementById('quit-btn').addEventListener('click', function() {
  if (lastSessionWasPractice) {
    showScreen('screen-practice');
    updatePracticeUI();
    return;
  }
  // Mark current as wrong if unanswered
  if (!gameState.answered && gameState.idx < gameState.questions.length) {
    const q = gameState.questions[gameState.idx];
    gameState.wrongByRegion[q.region] = (gameState.wrongByRegion[q.region] || 0) + 1;
  }
  endGame();
});

// ─── END GAME (run results) ──────────────────────────────────────────────────
// Renders either a nickname prompt (first time there's something to submit)
// or the "You're #X of Y" callout, into the end screen's leaderboard slot.
// Every failure mode here just clears the slot — local personal bests already
// did their job by this point, so the shared leaderboard is pure bonus.
async function updateEndLeaderboardSlot(region, correct, total, timeMs) {
  const slot = document.getElementById('end-leaderboard-slot');
  const name = getNickname();

  if (!name) {
    slot.innerHTML = `
      <div class="rank-callout">
        <div class="nickname-prompt-label">Pick a name for the leaderboard</div>
        <div class="nickname-prompt-row">
          <input type="text" class="nickname-input" id="nickname-input" placeholder="e.g. Sam" maxlength="24" autocomplete="off">
          <button class="nickname-save-btn" id="nickname-save-btn">Save</button>
        </div>
      </div>`;
    const doSave = () => {
      const input = document.getElementById('nickname-input');
      const value = input.value.trim();
      if (!value) { input.focus(); return; }
      setNickname(value);
      updateEndLeaderboardSlot(region, correct, total, timeMs);
    };
    document.getElementById('nickname-save-btn').addEventListener('click', doSave);
    document.getElementById('nickname-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); doSave(); }
    });
    return;
  }

  const result = await submitScoreIfBetter(region, correct, total, timeMs);
  if (!result.ok) { slot.innerHTML = ''; return; }

  const entries = await fetchLeaderboard(region);
  if (!entries) { slot.innerHTML = ''; return; }

  const deviceId = getDeviceId();
  const idx = entries.findIndex(e => e.deviceId === deviceId);
  if (idx === -1) { slot.innerHTML = ''; return; }

  slot.innerHTML = `
    <div class="rank-callout">
      <div class="rank-callout-text">You're #${idx + 1} of ${entries.length} in ${leaderboardRegionLabel(region)}</div>
      <button class="rank-callout-link" id="view-leaderboard-link">View leaderboard →</button>
    </div>`;
  document.getElementById('view-leaderboard-link').addEventListener('click', () => {
    openLeaderboard(region);
  });
}

function endGame() {
  const runTotal = gameState.questions.length;
  const correct = gameState.correct;
  const completed = gameState.idx >= runTotal;
  const pct = runTotal > 0 ? Math.round((correct / runTotal) * 100) : 0;
  const elapsed = gameState.startTime ? (Date.now() - gameState.startTime) : 0;
  const star = completed && correct === runTotal;

  // Only a finished run counts toward a personal best.
  let newBest = false;
  if (completed) newBest = recordBest(gameState.mode.region, correct, runTotal, elapsed);
  const best = loadBests()[gameState.mode.region] || null;

  const regionName = gameState.mode.region === 'All' ? 'World' : gameState.mode.region;

  document.getElementById('end-eyebrow').textContent =
    !completed ? 'Run Ended' : star ? '★ Perfect Run' : newBest ? 'New Best!' : 'Run Complete';
  document.getElementById('end-score-big').textContent = `${correct}/${runTotal}`;
  document.getElementById('end-score-label').textContent = `${regionName} · ${pct}% · ${fmtTime(elapsed)}`;

  // Run mode uses a single "Back to Menu" button.
  document.getElementById('practice-again-btn').style.display = 'none';
  document.getElementById('play-again-btn').textContent = 'Back to Menu';

  const bestStr = best
    ? `${best.star ? '★ ' : ''}${best.correct}/${best.total} · ${fmtTime(best.timeMs)}`
    : '—';

  document.getElementById('end-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Time</div>
      <div class="stat-value">${fmtTime(elapsed)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Accuracy</div>
      <div class="stat-value ${pct >= 70 ? 'green' : pct >= 50 ? '' : 'red'}">${pct}%</div>
    </div>
    <div class="stat-card" style="grid-column:1 / -1">
      <div class="stat-label">Your Best</div>
      <div class="stat-value" style="font-size:15px">${bestStr}</div>
    </div>
  `;

  const leaderboardSlot = document.getElementById('end-leaderboard-slot');
  leaderboardSlot.innerHTML = '';
  if (completed) {
    updateEndLeaderboardSlot(gameState.mode.region, correct, runTotal, elapsed);
  }

  showScreen('screen-end');
}

// ─── PRACTICE STATE ───────────────────────────────────────────────────────────
let practiceConfig = {
  region: null,
  difficulty: null,
  count: null,
  customActive: false,
  customCountries: new Set(),
};
let lastSessionWasPractice = false;

const PRACTICE_REGIONS = ["Europe", "Asia", "Africa", "North America", "South America", "Oceania"];
const PRACTICE_DIFFS   = ["hard", "easy"];
const PRACTICE_COUNTS  = [3, 5, 10];

// ─── BUILD PRACTICE SCREEN ────────────────────────────────────────────────────
function buildPracticeScreen() {
  practiceConfig.customActive = false;
  // Region buttons
  const regionWrap = document.getElementById('practice-region-opts');
  regionWrap.innerHTML = '';
  PRACTICE_REGIONS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'practice-opt-btn';
    btn.textContent = r;
    btn.dataset.value = r;
    btn.addEventListener('click', () => {
      practiceConfig.region = r;
      updatePracticeUI();
    });
    regionWrap.appendChild(btn);
  });

  // Difficulty buttons
  const diffWrap = document.getElementById('practice-diff-opts');
  diffWrap.innerHTML = '';
  PRACTICE_DIFFS.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'practice-opt-btn';
    btn.textContent = masteryLabel(d);
    btn.dataset.value = d;
    btn.addEventListener('click', () => {
      practiceConfig.difficulty = d;
      updatePracticeUI();
    });
    diffWrap.appendChild(btn);
  });
  const customDrillBtn = document.createElement('button');
  customDrillBtn.className = 'practice-opt-btn';
  customDrillBtn.textContent = 'Custom';
  customDrillBtn.dataset.value = 'custom';
  customDrillBtn.addEventListener('click', () => {
    practiceConfig.difficulty = 'custom';
    updatePracticeUI();
  });
  diffWrap.appendChild(customDrillBtn);

  // Count buttons
  const countWrap = document.getElementById('practice-count-opts');
  countWrap.innerHTML = '';
  PRACTICE_COUNTS.forEach(n => {
    const btn = document.createElement('button');
    btn.className = 'practice-opt-btn';
    btn.textContent = `${n} questions`;
    btn.dataset.value = n;
    btn.addEventListener('click', () => {
      practiceConfig.count = n;
      practiceConfig.customActive = false;
      const ci = document.getElementById('practice-custom-input');
      if (ci) ci.value = '';
      updatePracticeUI();
    });
    countWrap.appendChild(btn);
  });

  // Custom count: a button that reveals an inline number field
  const customBtn = document.createElement('button');
  customBtn.className = 'practice-opt-btn';
  customBtn.id = 'practice-custom-btn';
  customBtn.textContent = 'Other';
  customBtn.addEventListener('click', () => {
    practiceConfig.customActive = true;
    const ci = document.getElementById('practice-custom-input');
    if (ci) { ci.focus(); ci.select(); }
    // Apply current field value if any
    applyCustomCount();
    updatePracticeUI();
  });
  countWrap.appendChild(customBtn);

  const customInput = document.createElement('input');
  customInput.type = 'number';
  customInput.id = 'practice-custom-input';
  customInput.className = 'practice-custom-input';
  customInput.min = '1';
  customInput.placeholder = '#';
  customInput.addEventListener('input', () => {
    practiceConfig.customActive = true;
    applyCustomCount();
    updatePracticeUI();
  });
  countWrap.appendChild(customInput);

  updatePracticeUI();
}

// Read the custom field, clamp to >=1, and set it as the active count
function applyCustomCount() {
  const ci = document.getElementById('practice-custom-input');
  if (!ci) return;
  const raw = parseInt(ci.value, 10);
  if (!isNaN(raw) && raw >= 1) {
    practiceConfig.count = raw;
  } else {
    practiceConfig.count = null;
  }
}

function updatePracticeUI() {
  const { region, difficulty, count } = practiceConfig;

  // Sync region buttons
  document.querySelectorAll('#practice-region-opts .practice-opt-btn').forEach(btn => {
    btn.className = 'practice-opt-btn' + (btn.dataset.value === region ? ' selected-region' : '');
  });

  // Sync difficulty buttons
  document.querySelectorAll('#practice-diff-opts .practice-opt-btn').forEach(btn => {
    const d = btn.dataset.value;
    const sel = d === difficulty;
    btn.className = 'practice-opt-btn' + (sel ? ` selected-diff-${d}` : '');
  });

  // Sync count buttons (presets) — only highlight when NOT in custom mode
  document.querySelectorAll('#practice-count-opts .practice-opt-btn').forEach(btn => {
    if (btn.id === 'practice-custom-btn') {
      btn.className = 'practice-opt-btn' + (practiceConfig.customActive ? ' selected-count' : '');
    } else {
      const isSel = !practiceConfig.customActive && Number(btn.dataset.value) === count;
      btn.className = 'practice-opt-btn' + (isSel ? ' selected-count' : '');
    }
  });
  // Show/hide the custom input
  const customInput = document.getElementById('practice-custom-input');
  if (customInput) {
    customInput.classList.toggle('visible', !!practiceConfig.customActive);
  }

  // Region and Questions-per-session only apply to Learning/Mastered drilling;
  // the Countries picker replaces both when "Custom" is selected.
  const isCustomMode = difficulty === 'custom';
  document.getElementById('practice-region-section').style.display = isCustomMode ? 'none' : '';
  document.getElementById('practice-count-section').style.display = isCustomMode ? 'none' : '';
  document.getElementById('practice-custom-section').style.display = isCustomMode ? '' : 'none';

  const startBtn = document.getElementById('start-practice-btn');

  if (isCustomMode) {
    buildCustomPicker();
    const chosen = practiceConfig.customCountries.size;
    startBtn.textContent = chosen ? `Start Practice (${chosen}) →` : 'Start Practice →';
    startBtn.disabled = chosen === 0;
    return;
  }
  startBtn.textContent = 'Start Practice →';

  // Pool info
  const infoEl = document.getElementById('practice-pool-info');

  if (region && difficulty) {
    const pool = QUESTIONS.filter(q =>
      q.region === region && getEffectiveDifficulty(q) === difficulty
    );
    const available = pool.length;
    const chosen = count || '?';
    const willPlay = count ? Math.min(count, available) : null;

    if (available === 0) {
      infoEl.innerHTML = `<span class="pool-warn">No countries in this combination.</span>`;
      startBtn.disabled = true;
    } else if (count && available < count) {
      infoEl.innerHTML = `<span class="pool-num">${available}</span> countries available — session will use all <span class="pool-num">${available}</span>.`;
      startBtn.disabled = false;
    } else if (count) {
      infoEl.innerHTML = `<span class="pool-num">${available}</span> countries available — session will pick <span class="pool-num">${willPlay}</span> randomly.`;
      startBtn.disabled = false;
    } else {
      infoEl.innerHTML = `<span class="pool-num">${available}</span> countries available. Choose a question count above.`;
      startBtn.disabled = true;
    }
  } else {
    infoEl.innerHTML = '';
    startBtn.disabled = true;
  }
}

function startPractice() {
  const { region, difficulty, count } = practiceConfig;

  if (difficulty === 'custom') {
    const pool = QUESTIONS.filter(q => practiceConfig.customCountries.has(q.country));
    if (!pool.length) return;

    lastSessionWasPractice = true;
    const fixedPool = shuffle(pool);

    gameState = {
      questions: [...fixedPool],
      practicePool: fixedPool,
      idx: 0,
      correct: 0,
      wrongByRegion: {},
      totalByRegion: {},
      showedAnswer: false,
      answered: false,
      mode: { region: 'Custom', diff: 'custom' }
    };

    showScreen('screen-game');
    renderQuestion();
    return;
  }

  if (!region || !difficulty || !count) return;

  let pool = QUESTIONS.filter(q =>
    q.region === region && getEffectiveDifficulty(q) === difficulty
  );
  if (!pool.length) return;

  // Slice to chosen count
  pool = shuffle(pool).slice(0, count);

  lastSessionWasPractice = true;
  const fixedPool = shuffle(pool).slice(0, count);

  gameState = {
    questions: [...fixedPool],
    practicePool: fixedPool,
    idx: 0,
    correct: 0,
    wrongByRegion: {},
    totalByRegion: {},
    showedAnswer: false,
    answered: false,
    mode: { region, diff: difficulty }
  };

  showScreen('screen-game');
  renderQuestion();
}

// ─── CUSTOM COUNTRY PICKER (Practice → "Custom" drill mode) ──────────────────
const openCustomRegions = new Set();

function buildCustomPicker() {
  const summary = document.getElementById('custom-picker-summary');
  const total = practiceConfig.customCountries.size;
  summary.innerHTML = `<span><span class="mastered-count">${total}</span> selected</span>`;
  const clearBtn = document.createElement('button');
  clearBtn.className = 'manage-reset';
  clearBtn.textContent = 'Clear all';
  clearBtn.addEventListener('click', () => {
    practiceConfig.customCountries.clear();
    updatePracticeUI();
  });
  summary.appendChild(clearBtn);

  const body = document.getElementById('custom-picker-body');
  body.innerHTML = '';

  PRACTICE_REGIONS.forEach(region => {
    const countries = QUESTIONS.filter(q => q.region === region)
      .sort((a, b) => a.country.localeCompare(b.country));
    const selectedCount = countries.filter(q => practiceConfig.customCountries.has(q.country)).length;
    const isOpen = openCustomRegions.has(region);

    const group = document.createElement('div');
    group.className = 'region-group' + (isOpen ? ' open' : '');

    const titleEl = document.createElement('div');
    titleEl.className = 'region-group-title';

    const titleText = document.createElement('span');
    titleText.textContent = region;

    const meta = document.createElement('span');
    meta.className = 'region-meta';
    meta.textContent = `${selectedCount}/${countries.length} selected`;

    const allSelected = selectedCount === countries.length;
    const selectAllBtn = document.createElement('span');
    selectAllBtn.className = 'region-select-all';
    selectAllBtn.textContent = allSelected ? 'Clear' : 'Select all';
    selectAllBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (allSelected) {
        countries.forEach(q => practiceConfig.customCountries.delete(q.country));
      } else {
        countries.forEach(q => practiceConfig.customCountries.add(q.country));
      }
      updatePracticeUI();
    });

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '▼';

    titleEl.appendChild(titleText);
    titleEl.appendChild(meta);
    titleEl.appendChild(selectAllBtn);
    titleEl.appendChild(chevron);

    titleEl.addEventListener('click', () => {
      if (openCustomRegions.has(region)) openCustomRegions.delete(region);
      else openCustomRegions.add(region);
      buildCustomPicker();
    });

    const groupBody = document.createElement('div');
    groupBody.className = 'region-group-body';

    countries.forEach(q => {
      const checked = practiceConfig.customCountries.has(q.country);
      const row = document.createElement('div');
      row.className = 'pick-row' + (checked ? ' checked' : '');

      const box = document.createElement('span');
      box.className = 'pick-checkbox' + (checked ? ' checked' : '');

      const name = document.createElement('span');
      name.className = 'pick-row-name';
      name.textContent = q.country;

      row.appendChild(box);
      row.appendChild(name);

      row.addEventListener('click', () => {
        if (practiceConfig.customCountries.has(q.country)) {
          practiceConfig.customCountries.delete(q.country);
        } else {
          practiceConfig.customCountries.add(q.country);
        }
        updatePracticeUI();
      });

      groupBody.appendChild(row);
    });

    group.appendChild(titleEl);
    group.appendChild(groupBody);
    body.appendChild(group);
  });
}

// ─── LEADERBOARD SCREEN ───────────────────────────────────────────────────────
const LEADERBOARD_REGIONS = [...BOARD_REGIONS, 'All'];
let leaderboardRegion = 'Europe';

function leaderboardRegionLabel(r) { return r === 'All' ? 'World' : r; }

function buildLeaderboardRegionTabs() {
  const wrap = document.getElementById('leaderboard-region-opts');
  wrap.innerHTML = '';
  LEADERBOARD_REGIONS.forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'practice-opt-btn' + (r === leaderboardRegion ? ' selected-region' : '');
    btn.textContent = leaderboardRegionLabel(r);
    btn.addEventListener('click', () => {
      leaderboardRegion = r;
      buildLeaderboardRegionTabs();
      renderLeaderboardList();
    });
    wrap.appendChild(btn);
  });
}

async function renderLeaderboardList() {
  const list = document.getElementById('leaderboard-list');
  const requestedRegion = leaderboardRegion;
  list.innerHTML = '<div class="leaderboard-empty">Loading…</div>';

  const entries = await fetchLeaderboard(requestedRegion);
  // Bail if the user switched regions while this was in flight
  if (requestedRegion !== leaderboardRegion) return;

  if (entries === null) {
    list.innerHTML = '<div class="leaderboard-empty">Leaderboard unavailable right now.</div>';
    return;
  }
  if (entries.length === 0) {
    list.innerHTML = `<div class="leaderboard-empty">No runs yet in ${leaderboardRegionLabel(leaderboardRegion)}. Be the first!</div>`;
    return;
  }

  const deviceId = getDeviceId();
  list.innerHTML = '';
  entries.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'leaderboard-row' + (e.deviceId === deviceId ? ' you' : '');

    const rank = document.createElement('div');
    rank.className = 'leaderboard-rank';
    rank.textContent = String(i + 1);

    const name = document.createElement('div');
    name.className = 'leaderboard-name';
    name.textContent = e.name + (e.deviceId === deviceId ? ' (you)' : '');

    const score = document.createElement('div');
    score.className = 'leaderboard-score';
    score.innerHTML = (e.star ? '<span class="leaderboard-star">★</span>' : '') +
      `${e.correct}/${e.total} · ${fmtTime(e.timeMs)}`;

    row.appendChild(rank);
    row.appendChild(name);
    row.appendChild(score);
    list.appendChild(row);
  });
}

function openLeaderboard(region) {
  leaderboardRegion = region || leaderboardRegion;
  buildLeaderboardRegionTabs();
  renderLeaderboardList();
  showScreen('screen-leaderboard');
}

document.getElementById('open-leaderboard-btn').addEventListener('click', () => {
  openLeaderboard();
});

document.getElementById('back-from-leaderboard-btn').addEventListener('click', () => {
  buildBoard();
  showScreen('screen-mode');
});

// ─── BUILD MANAGE TAB (mastery tracker) ──────────────────────────────────────
// Track which regions are open across re-renders
const openRegions = new Set();

function buildManage() {
  const overrides = loadOverrides();
  const isMastered = q => (overrides[q.country] || q.difficulty) === 'easy';
  const regionOrder = ["Europe", "Asia", "Africa", "North America", "South America", "Oceania"];

  // ── Summary: total mastered + reset ──
  const masteredTotal = QUESTIONS.filter(isMastered).length;
  const summary = document.getElementById('manage-summary');
  summary.innerHTML =
    `<span><span class="mastered-count">${masteredTotal} of ${QUESTIONS.length}</span> mastered</span>`;
  const resetBtn = document.createElement('button');
  resetBtn.className = 'manage-reset';
  resetBtn.textContent = 'Reset all';
  resetBtn.addEventListener('click', () => {
    if (confirm('Reset every country to its starting category?')) {
      saveOverrides({});
      buildManage();
    }
  });
  summary.appendChild(resetBtn);

  const body = document.getElementById('manage-body');
  body.innerHTML = '';

  regionOrder.forEach(region => {
    const regionCountries = QUESTIONS.filter(q => q.region === region);
    const toLearn = regionCountries.filter(q => !isMastered(q)).sort((a, b) => a.country.localeCompare(b.country));
    const mastered = regionCountries.filter(q => isMastered(q)).sort((a, b) => a.country.localeCompare(b.country));
    const countries = [...toLearn, ...mastered];

    const masteredCount = mastered.length;
    const isOpen = openRegions.has(region);

    const group = document.createElement('div');
    group.className = 'region-group' + (isOpen ? ' open' : '');

    // ── Header (clickable) ──
    const titleEl = document.createElement('div');
    titleEl.className = 'region-group-title';

    const titleText = document.createElement('span');
    titleText.textContent = region;

    const meta = document.createElement('span');
    meta.className = 'region-meta';
    meta.textContent = `${masteredCount}/${countries.length} mastered`;

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '▼';

    titleEl.appendChild(titleText);
    titleEl.appendChild(meta);
    titleEl.appendChild(chevron);

    titleEl.addEventListener('click', () => {
      if (openRegions.has(region)) openRegions.delete(region);
      else openRegions.add(region);
      buildManage();
    });

    // ── Body (rows) ──
    const groupBody = document.createElement('div');
    groupBody.className = 'region-group-body';

    const grid = document.createElement('div');
    grid.className = 'country-rows-grid';

    function appendCountryRow(q) {
      const effective = overrides[q.country] || q.difficulty;
      const isCustom = !!overrides[q.country];

      // All accepted answers for this country
      const allAnswers = q.accept ? q.accept : [q.capital];
      const capitalText = allAnswers.join(' / ');

      // Cell 1: country name
      const nameEl = document.createElement('div');
      nameEl.className = 'country-name' + (isCustom ? ' is-custom' : '');
      nameEl.textContent = q.country;

      // Cell 2: capital(s)
      const capitalEl = document.createElement('div');
      capitalEl.className = 'country-capital';
      capitalEl.textContent = capitalText;

      // Cell 3: toggle
      const toggleCell = document.createElement('div');
      toggleCell.className = 'country-toggle-cell';

      const toggle = document.createElement('div');
      toggle.className = 'diff-toggle';

      ['hard', 'easy'].forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'diff-toggle-btn' + (effective === d ? ` active-${d}` : '');
        btn.textContent = masteryLabel(d);
        btn.addEventListener('click', () => {
          const curr = loadOverrides();
          if (d === q.difficulty) {
            delete curr[q.country];
          } else {
            curr[q.country] = d;
          }
          saveOverrides(curr);
          buildManage();
        });
        toggle.appendChild(btn);
      });

      toggleCell.appendChild(toggle);
      grid.appendChild(nameEl);
      grid.appendChild(capitalEl);
      grid.appendChild(toggleCell);
    }

    toLearn.forEach(appendCountryRow);

    // Thin divider between "still learning" and "mastered" — only when both exist
    if (toLearn.length && mastered.length) {
      for (let i = 0; i < 3; i++) {
        const cell = document.createElement('div');
        cell.className = 'manage-divider-cell';
        grid.appendChild(cell);
      }
    }

    mastered.forEach(appendCountryRow);

    groupBody.appendChild(grid);
    group.appendChild(titleEl);
    group.appendChild(groupBody);
    body.appendChild(group);
  });
}

// ─── PRACTICE TABS (Practice / Manage) ───────────────────────────────────────
function setPracticeTab(which) {
  document.querySelectorAll('.practice-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === which);
  });
  document.getElementById('practice-setup-pane').classList.toggle('active', which === 'setup');
  document.getElementById('practice-manage-pane').classList.toggle('active', which === 'manage');
  if (which === 'manage') buildManage();
}

document.querySelectorAll('.practice-tab').forEach(tab => {
  tab.addEventListener('click', () => setPracticeTab(tab.dataset.tab));
});

// ─── MAP ─────────────────────────────────────────────────────────────────────
let quizMap = null;
let geoJsonLayer = null;
let capitalMarker = null;
let worldGeoJson = null;
let mapInitialised = false;
let leafletLoading = null;
let pendingMapUpdate = null;

// Dynamically load Leaflet JS, return a promise that resolves when L is ready
function loadLeaflet() {
  if (window.L) return Promise.resolve();
  if (leafletLoading) return leafletLoading;
  leafletLoading = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    script.onload = () => resolve();
    script.onerror = () => reject(new Error('Leaflet failed to load'));
    document.head.appendChild(script);
  });
  return leafletLoading;
}

// Country name normalisation for GeoJSON matching (Natural Earth 110m)
const GEO_NAME_MAP = {
  "Czech Republic":"Czechia",
  "DR Congo":"Dem. Rep. Congo",
  "Republic of Congo":"Congo",
  "Bosnia & Herzegovina":"Bosnia and Herz.",
  "Trinidad & Tobago":"Trinidad and Tobago",
  "East Timor":"Timor-Leste",
  "United States":"United States of America",
  "Dominican Republic":"Dominican Rep.",
  "South Sudan":"S. Sudan",
  "Central African Republic":"Central African Rep.",
  "Equatorial Guinea":"Eq. Guinea",
  "Solomon Islands":"Solomon Is.",
  "Marshall Islands":"Marshall Is.",
  "Eswatini":"eSwatini",
};

function geoName(country) {
  return GEO_NAME_MAP[country] || country;
}

function initMap() {
  if (mapInitialised) return;
  mapInitialised = true;

  loadLeaflet().then(() => {
    quizMap = L.map('quiz-map', {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false,
      touchZoom: false,
      fadeAnimation: false,
      zoomAnimation: false,
    });

    // Set an initial view so the map has a defined state
    quizMap.setView([20, 0], 2);

    // No tile layer — the map renders purely from embedded country shapes
    // on the dark canvas (set via CSS). This removes all external image
    // requests and makes the map fully self-contained.

    // The world boundary data is embedded directly in the file
    worldGeoJson = WORLD_GEOJSON;

    // Force size recalculation now that the container is visible
    requestAnimationFrame(() => {
      if (quizMap) quizMap.invalidateSize();
      if (pendingMapUpdate) {
        const p = pendingMapUpdate;
        updateMap(p.country, p.lat, p.lng);
      }
    });
  }).catch(() => {
    mapInitialised = false; // allow retry
  });
}

function updateMap(countryName, lat, lng) {
  // If map isn't ready yet, stash the request and bail; initMap will apply it
  if (!quizMap || !window.L) {
    pendingMapUpdate = { country: countryName, lat, lng };
    initMap();
    return;
  }
  pendingMapUpdate = { country: countryName, lat, lng };

  // Remove old layers
  if (geoJsonLayer) { quizMap.removeLayer(geoJsonLayer); geoJsonLayer = null; }
  if (capitalMarker) { quizMap.removeLayer(capitalMarker); capitalMarker = null; }

  // Zoom level based on country size / island-ness
  const smallIslands = new Set([
    "Maldives","Nauru","Tuvalu","Palau","Marshall Islands","Kiribati","Tonga",
    "Samoa","Vanuatu","Solomon Islands","Federated States of Micronesia","Comoros",
    "Cape Verde","Seychelles","Sao Tome & Principe","Bahrain","Malta","Monaco",
    "Vatican City","San Marino","Liechtenstein","Andorra","Luxembourg","Singapore",
    "Djibouti","Trinidad & Tobago","Barbados","Grenada","St. Lucia","Dominica",
    "St. Kitts & Nevis","Antigua & Barbuda","St. Vincent & Grenadines","Bahamas",
    "Jamaica","Cuba","East Timor","Brunei","Fiji","Papua New Guinea",
  ]);
  const largeCountries = new Set([
    "Russia","Canada","United States","China","Brazil","Australia","India",
    "Argentina","Kazakhstan","Algeria","DR Congo","Saudi Arabia","Mexico",
    "Indonesia","Sudan","Libya","Iran","Mongolia","Peru","Chad",
  ]);

  let zoom;
  if (smallIslands.has(countryName)) zoom = 5;
  else if (largeCountries.has(countryName)) zoom = 3;
  else zoom = 5;

  // Recalculate container size first (it may have been 0 when the map was built),
  // then centre — otherwise the view is computed against the wrong dimensions.
  quizMap.invalidateSize();
  quizMap.setView([lat, lng], zoom, { animate: false });

  // Draw GeoJSON highlight + neighbour labels
  if (worldGeoJson) {
    const targetName = geoName(countryName);

    geoJsonLayer = L.geoJSON(worldGeoJson, {
      style: feature => {
        const name = feature.properties.NAME || feature.properties.ADMIN || '';
        const isTarget = name === targetName ||
          (feature.properties.NAME_EN && feature.properties.NAME_EN === targetName);
        if (isTarget) {
          return {
            fillColor: '#F5A623',
            fillOpacity: 0.55,
            color: '#F5A623',
            weight: 2,
            opacity: 1,
          };
        }
        return {
          fillColor: '#223349',
          fillOpacity: 1,
          color: '#324a68',
          weight: 0.6,
          opacity: 1,
        };
      },
      onEachFeature: (feature, layer) => {
        const name = feature.properties.NAME || feature.properties.ADMIN || '';
        const isTarget = name === targetName ||
          (feature.properties.NAME_EN && feature.properties.NAME_EN === targetName);
        if (!isTarget && name) {
          // Add neighbour label at polygon centroid
          try {
            const bounds = layer.getBounds();
            const centre = bounds.getCenter();
            const mapBounds = quizMap.getBounds().pad(0.5);
            if (mapBounds.contains(centre)) {
              L.marker(centre, {
                icon: L.divIcon({
                  className: 'neighbour-label',
                  html: name,
                  iconAnchor: [0, 0],
                }),
                interactive: false,
              }).addTo(geoJsonLayer);
            }
          } catch(e) {}
        }
      }
    }).addTo(quizMap);
  }

  // Capital dot marker
  const dotIcon = L.divIcon({
    className: '',
    html: `<div class="capital-dot-wrap"><div class="capital-dot" id="capital-dot"></div><div class="capital-dot-ring"></div></div>`,
    iconSize: [0, 0],
    iconAnchor: [0, 0],
  });
  capitalMarker = L.marker([lat, lng], { icon: dotIcon, interactive: false, zIndexOffset: 1000 }).addTo(quizMap);

  // After layout settles, recalc size and re-centre once more for safety
  requestAnimationFrame(() => {
    if (!quizMap) return;
    quizMap.invalidateSize();
    quizMap.setView([lat, lng], zoom, { animate: false });
  });
}

function flashCapitalDot() {
  const dot = document.getElementById('capital-dot');
  if (!dot) return;
  dot.classList.add('correct-flash');
  setTimeout(() => dot.classList.remove('correct-flash'), 600);
}

// Initialise map when game screen first becomes visible
const gameScreenObserver = new MutationObserver(() => {
  if (document.getElementById('screen-game').classList.contains('active')) {
    initMap();
  }
});
gameScreenObserver.observe(document.getElementById('screen-game'), { attributes: true, attributeFilter: ['class'] });

buildBoard();
